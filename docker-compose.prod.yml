services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports: []
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Remove dev volume mount

  contracts:
    environment:
      NODE_ENV: production
    volumes: []  # Remove dev volumes
    command: npx hardhat node  # Keep same
    ports: []
    expose:
      - "8545"

  backend:
    build:
      context: .
      dockerfile: docker/backend.prod.Dockerfile  # Switch to prod Dockerfile
    volumes: []  # Remove all dev volumes
    command: >
      sh -c "
      echo 'Waiting for services...' &&
      sleep 10 &&
      echo 'Running migrations...' &&
      node dist/migrations/run.js &&
      echo 'Starting backend server...' &&
      node dist/index.js
      "
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      DB_PASSWORD: ${DB_PASSWORD}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://yourdomain.com}
    ports: []
    expose:
      - "4000"

  game-client:
    build:
      context: .
      dockerfile: docker/game-client.prod.Dockerfile  # Switch to prod Dockerfile
    volumes: []  # Remove dev volumes
    command: []  # Use Dockerfile CMD
    environment:
      NODE_ENV: production
    ports: []
    expose:
      - "3000"

  creator-dashboard:
    build:
      context: .
      dockerfile: docker/creator-dashboard.prod.Dockerfile  # Switch to prod Dockerfile
    volumes: []  # Remove dev volumes
    command: []  # Use Dockerfile CMD
    environment:
      NODE_ENV: production
    ports: []
    expose:
      - "3001"

  nginx:
    image: nginx:alpine
    container_name: miniworld-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx-prod.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - game-client
      - creator-dashboard
      - backend
    networks:
      - miniworld-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  miniworld-network: